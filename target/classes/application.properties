spring.application.name=payment-service
server.port=8080

# Ledger service base URL
ledger.base-url=http://localhost:8081

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

kafka.topic.payment-events=payment.events

# Ledger HTTP client timeouts
ledger.connect-timeout-ms=2000
ledger.read-timeout-ms=5000

# Kafka producer reliability settings
# acks=all: leader + all in-sync replicas must acknowledge before success
spring.kafka.producer.acks=all
# retries + backoff: retry up to ~30 s worth of transient errors
spring.kafka.producer.retries=5
spring.kafka.producer.properties.retry.backoff.ms=1000
# delivery.timeout covers the full send lifecycle including retries
spring.kafka.producer.properties.delivery.timeout.ms=30000
# enable.idempotence prevents duplicate messages on retry
spring.kafka.producer.properties.enable.idempotence=true
