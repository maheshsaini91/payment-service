version: "3.9"

# Brings up everything the payment-service needs to run locally:
#   • Kafka (+ Zookeeper)
#   • A stub Ledger service (WireMock) so you can test the full flow
#     without a real Ledger deployment
#
# Usage:
#   docker compose up -d
#   ./mvnw spring-boot:run
#
# WireMock stubs live in ./wiremock/mappings/
# Kafka UI available at http://localhost:8090

services:

  # ── Kafka ──────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # Kafka UI — browse topics and messages at http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── Ledger stub (WireMock) ─────────────────────────────────────────────────
  ledger-stub:
    image: wiremock/wiremock:3.6.0
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: ["--root-dir", "/home/wiremock", "--verbose"]
